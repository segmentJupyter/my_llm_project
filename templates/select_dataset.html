<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Select Dataset</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  </head>
  <body class="dash-body">
    <div class="container py-5" style="max-width: 720px">
      <div class="d-flex align-items-center justify-content-between mb-4">
        <div>
          <div class="hero-eyebrow">Routing</div>
          <h2 class="text-white m-0">Choose your series</h2>
          <p class="text-secondary small mb-0">LSTM-ready files show a badge — train via terminal first.</p>
        </div>
        <a class="btn btn-outline-light btn-sm" href="{{ url_for('index') }}">Home</a>
      </div>

      <div class="glass-card p-4">
        <form method="POST">
          <div class="mb-3">
            <label class="form-label text-secondary">Datasets in <code class="text-warning">data/</code></label>
            <select class="form-select form-select-lg bg-dark text-white border-secondary" name="dataset" required>
              {% for d in datasets %}
              <option value="{{ d.name }}" {% if d.name == active_dataset %}selected{% endif %}>
                {{ d.name }}{% if d.trained %}  ✓ LSTM checkpoint{% endif %}
              </option>
              {% endfor %}
            </select>
          </div>

          <button class="btn btn-accent px-4" type="submit">Open dashboard</button>
          <a class="btn btn-outline-light ms-2" href="{{ url_for('upload') }}">Upload new</a>
        </form>

        {% if message %}
        <hr class="border-secondary opacity-25 my-4" />
        <div class="alert alert-info glass-alert mb-0">{{ message }}</div>
        {% endif %}
      </div>
    </div>
  </body>
</html>

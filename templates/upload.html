<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Upload Dataset</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  </head>
  <body class="bg-light">
    <div class="container py-4">
      <div class="d-flex align-items-center justify-content-between mb-3">
        <h3 class="m-0">Upload dataset</h3>
        <a class="btn btn-outline-secondary btn-sm" href="{{ url_for('index') }}">Home</a>
      </div>

      <div class="card shadow-sm">
        <div class="card-body">
          <form method="POST" enctype="multipart/form-data">
            <div class="mb-3">
              <label class="form-label">Dataset file (CSV or TXT)</label>
              <input class="form-control" type="file" name="file" required />
              <div class="form-text">TXT is auto-parsed via delimiters or log extraction.</div>
            </div>
            <button class="btn btn-primary" type="submit">Upload</button>
            <a class="btn btn-outline-primary" href="{{ url_for('select_dataset') }}">Select dataset</a>
          </form>

          {% if error %}
          <hr />
          <div class="alert alert-danger">{{ error }}</div>
          {% endif %}

          {% if uploaded_name %}
          <hr />
          <div class="alert alert-success">
            Uploaded: <strong>{{ uploaded_name }}</strong>. Parsed timestamp column: <code>{{ ts_col }}</code>, energy column:
            <code>{{ energy_col }}</code>.
          </div>

          <h5 class="mt-3">Preview</h5>
          <div class="table-responsive">
            {{ preview_table|safe }}
          </div>
          {% endif %}
        </div>
      </div>
    </div>
  </body>
</html>
